<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: -apple-system, 'Segoe UI', Georgia, serif; user-select: none; -webkit-user-select: none; }

#game { width: 100vw; height: 100vh; position: relative; overflow: hidden; }

/* SKY */
#sky { position: absolute; top: 0; left: 0; right: 0; height: 62%; transition: background 1.4s ease; }

/* CLOUDS */
#clouds { position: absolute; top: 0; left: 0; right: 0; height: 62%; pointer-events: none; overflow: hidden; }
.cloud { position: absolute; background: rgba(255,255,255,0.82); border-radius: 50px; filter: blur(5px); animation: cloudDrift 22s ease-in-out infinite alternate; }
.cloud:nth-child(2) { animation-duration: 28s; animation-delay: -10s; }
.cloud:nth-child(3) { animation-duration: 17s; animation-delay: -5s; }
.cloud:nth-child(4) { animation-duration: 32s; animation-delay: -18s; }
.cloud:nth-child(5) { animation-duration: 20s; animation-delay: -7s; }
@keyframes cloudDrift { from { transform: translateX(-6%); } to { transform: translateX(6%); } }

/* WORLD */
#world { position: absolute; top: 0; left: 0; height: 100%; width: 1px; overflow: visible; transition: transform 0.95s cubic-bezier(0.4, 0, 0.2, 1); will-change: transform; }

/* CHARACTER */
#char-wrap { position: fixed; z-index: 50; pointer-events: none; transition: bottom 0.95s cubic-bezier(0.4, 0, 0.2, 1); }
@keyframes bounce {
  0%   { transform: translateX(-50%) translateY(0); }
  30%  { transform: translateX(-50%) translateY(-12px); }
  55%  { transform: translateX(-50%) translateY(-4px); }
  75%  { transform: translateX(-50%) translateY(-8px); }
  90%  { transform: translateX(-50%) translateY(-2px); }
  100% { transform: translateX(-50%) translateY(0); }
}
#char-wrap.bounce { animation: bounce 0.6s ease forwards; }

/* CARD */
#info-card {
  position: fixed; bottom: -600px; left: 50%; transform: translateX(-50%);
  width: min(580px, 92vw); background: #fff; border-radius: 24px;
  box-shadow: 0 12px 60px rgba(0,0,0,0.16), 0 2px 8px rgba(0,0,0,0.06);
  z-index: 200; transition: bottom 0.58s cubic-bezier(0.34, 1.35, 0.64, 1); overflow: hidden;
}
#info-card.show { bottom: 16px; }

#card-image-wrap { position: relative; width: 100%; }
#card-image {
  width: 100%; max-height: 340px; object-fit: contain; display: none;
  border-radius: 24px 24px 0 0; background: #f5f5f5;
}
#card-image.visible { display: block; }
/* Image upload label (shown when no image set) */
.img-upload-hint {
  display: none; width: 100%; padding: 22px; text-align: center;
  font-size: 13px; color: #bbb; border-bottom: 1px dashed #eee;
  cursor: pointer;
}
.img-upload-hint.show { display: block; }

/* Tag badge (fun, milestone, etc.) */
#card-tag {
  position: absolute; top: 12px; left: 16px;
  padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase; display: none;
}
#card-tag.show { display: inline-block; }

.card-body { padding: 22px 30px 14px; text-align: center; }
#card-year { font-size: 11px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; color: #e6a817; margin-bottom: 6px; }
#card-title { font-size: 21px; font-weight: 700; color: #1a1a2e; margin-bottom: 10px; line-height: 1.3; }
#card-desc  { font-size: 14.5px; line-height: 1.75; color: #555; }

/* "never will i ever" stamp */
#card-stamp {
  display: none; margin: 10px auto 0;
  font-size: 13px; font-weight: 800; color: #e53935; letter-spacing: 2px;
  text-transform: uppercase; border: 3px solid #e53935; border-radius: 8px;
  padding: 4px 14px; transform: rotate(-3deg); width: fit-content;
}
#card-stamp.show { display: block; }

.card-nav {
  display: flex; align-items: center; justify-content: center;
  gap: 18px; padding: 12px 24px; border-top: 1px solid #f0f0f0; margin-top: 14px;
}
.nav-btn {
  width: 44px; height: 44px; border-radius: 50%; border: 1.5px solid #e0e0e0;
  background: #fafafa; font-size: 18px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; transition: all 0.15s;
  color: #333; font-family: inherit; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.nav-btn:hover:not(:disabled) { background: #f0f0f0; transform: scale(1.1); }
.nav-btn:active:not(:disabled) { transform: scale(0.93); }
.nav-btn:disabled { opacity: 0.22; cursor: not-allowed; }
#progress { font-size: 13px; font-weight: 600; color: #bbb; min-width: 52px; text-align: center; }

/* KEY HINT */
#key-hint {
  position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.28); backdrop-filter: blur(8px);
  color: rgba(255,255,255,0.92); font-size: 12px; letter-spacing: 0.8px;
  padding: 7px 18px; border-radius: 30px; z-index: 100; display: none; white-space: nowrap;
}

/* TITLE SCREEN */
#title-screen {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(8,8,28,0.76); backdrop-filter: blur(8px);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: white; text-align: center; padding: 36px; transition: opacity 0.7s ease;
}
#ts-name { font-size: clamp(40px, 9vw, 96px); font-weight: 200; letter-spacing: 4px; line-height: 1.1; margin-bottom: 12px; }
#ts-tagline { font-size: 16px; opacity: 0.6; max-width: 420px; line-height: 1.65; margin-bottom: 48px; }
#start-btn {
  padding: 17px 54px; border: none; border-radius: 60px; background: #fff;
  color: #1a1a2e; font-size: 15px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; cursor: pointer; font-family: inherit;
  box-shadow: 0 4px 28px rgba(0,0,0,0.28); transition: transform 0.2s, box-shadow 0.2s;
}
#start-btn:hover { transform: scale(1.06); box-shadow: 0 8px 40px rgba(0,0,0,0.38); }

/* FLIGHT OVERLAY */
#flight-overlay {
  position: fixed; inset: 0; z-index: 45; pointer-events: none;
  opacity: 0; transition: opacity 1s ease;
  background: rgba(5,10,28,0.75);
}
#flight-overlay.show { opacity: 1; }
#flight-overlay svg { position: absolute; inset: 0; width: 100%; height: 100%; }
</style>
</head>

// ── Load chosen character from character_select.html ──────────────
const selectedChar = parseInt(localStorage.getItem('selectedCharacter') || '0', 10);
charWrap.innerHTML = CHARACTER_SVGS[Math.min(selectedChar, 3)];

// ── Walk animation ────────────────────────────────────────────────
let walkRAF  = null;
let walkTick = 0;

function startWalking() {
  if (walkRAF) return;
  function frame() {
    walkTick += 0.19;
    const a = Math.sin(walkTick) * 26;
    document.getElementById('leg-l').style.transform = `rotate(${a}deg)`;
    document.getElementById('leg-r').style.transform = `rotate(${-a}deg)`;
    document.getElementById('arm-l').style.transform = `rotate(${-a * 0.5}deg)`;
    document.getElementById('arm-r').style.transform = `rotate(${a * 0.5}deg)`;
    walkRAF = requestAnimationFrame(frame);
  }
  walkRAF = requestAnimationFrame(frame);
}

function stopWalking() {
  if (walkRAF) { cancelAnimationFrame(walkRAF); walkRAF = null; }
  ['leg-l','leg-r','arm-l','arm-r'].forEach(id => {
    document.getElementById(id).style.transform = '';
  });
  charWrap.classList.remove('bounce');
  void charWrap.offsetWidth;
  charWrap.classList.add('bounce');
  setTimeout(() => charWrap.classList.remove('bounce'), 700);
}

// ── Build world ───────────────────────────────────────────────────
function buildWorld() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const groundY = Math.round(vh * 0.62);

  function el(tag, css, html) {
    const d = document.createElement(tag);
    if (css)  d.style.cssText = css;
    if (html) d.innerHTML = html;
    return d;
  }

  // Base green ground (shows in Brown/post-flight sections)
  const ground = el('div', `
    position:absolute; left:-4000px; right:-4000px;
    top:${groundY}px; bottom:0;
    background:linear-gradient(180deg,#5a9e35 0%,#2d6e18 100%);
  `);
  const path = el('div', `
    position:absolute; top:0; left:0; right:0; height:32px;
    background:#c8a053; border-top:3px solid #a07030;
  `);
  path.appendChild(el('div', `
    position:absolute; top:50%; left:0; right:0; height:3px;
    transform:translateY(-50%);
    background:repeating-linear-gradient(90deg,
      transparent 0,transparent 28px,
      rgba(255,255,255,0.42) 28px,rgba(255,255,255,0.42) 56px);
  `));
  ground.appendChild(path);
  worldEl.appendChild(ground);

  // ── Pakistan zone: warm sandy/terracotta terrain ──────────────
  if (flightIdx > 0) {
    const pakEnd = xPositions[flightIdx - 1] + 440;
    const pak = el('div', `
      position:absolute; left:${-3900}px; width:${pakEnd + 3900}px;
      top:${groundY}px; bottom:0;
      background:linear-gradient(180deg,#c8965a 0%,#9e7040 100%);
      z-index:4; overflow:hidden;
    `);
    // Dusty brick path
    const pp = el('div', `
      position:absolute; top:0; left:0; right:0; height:32px;
      background:#b87348; border-top:3px solid #8c5628;
    `);
    pp.appendChild(el('div', `
      position:absolute; top:50%; left:0; right:0; height:3px;
      transform:translateY(-50%);
      background:repeating-linear-gradient(90deg,
        transparent 0,transparent 28px,
        rgba(255,210,140,0.45) 28px,rgba(255,210,140,0.45) 56px);
    `));
    pak.appendChild(pp);
    worldEl.appendChild(pak);
  }

  // ── Ocean zone ────────────────────────────────────────────────
  if (flightIdx > 0 && flightIdx < MILESTONES.length - 1) {
    const ox1 = xPositions[flightIdx - 1] + 420;
    const ox2 = xPositions[flightIdx + 1] - 180;
    const ocean = el('div', `
      position:absolute; left:${ox1}px; width:${ox2 - ox1}px;
      top:${groundY}px; bottom:0;
      background:linear-gradient(180deg,#1565c0 0%,#0d3464 100%);
      overflow:hidden; z-index:6;
    `);
    const ww = ox2 - ox1;
    ocean.innerHTML = `
      <svg viewBox="0 0 ${ww} 40" preserveAspectRatio="none" width="100%" height="40"
           xmlns="http://www.w3.org/2000/svg" style="position:absolute;top:0;left:0;">
        <path d="M0,20 Q${ww*0.25},8 ${ww*0.5},20 Q${ww*0.75},32 ${ww},20"
              stroke="rgba(255,255,255,0.18)" stroke-width="2" fill="none"/>
        <path d="M0,32 Q${ww*0.3},22 ${ww*0.6},32 Q${ww*0.8},38 ${ww},32"
              stroke="rgba(255,255,255,0.10)" stroke-width="1.5" fill="none"/>
      </svg>`;
    worldEl.appendChild(ocean);
  }

  // ── Mountain for Brown University ─────────────────────────────
  const brownPeakIdx = MILESTONES.findIndex(m => (m.yOffset || 0) >= 130);
  if (brownPeakIdx !== -1) {
    const mx  = xPositions[brownPeakIdx];
    const ph  = 200;   // peak height above groundY
    const mw  = 3000;  // mountain base width
    // Main mountain body
    const mt = el('div', `
      position:absolute;
      left:${mx - mw/2}px; top:${groundY - ph}px;
      width:${mw}px; height:${ph + 10}px;
      background:linear-gradient(170deg,#546e7a 0%,#607d8b 25%,#8a9e8a 65%,#5a9e35 100%);
      clip-path:polygon(0% 100%, 40% 7%, 50% 0%, 60% 7%, 100% 100%);
      z-index:1;
    `);
    // Snow cap
    const sc = el('div', `
      position:absolute;
      left:${mx - 240}px; top:${groundY - ph - 4}px;
      width:480px; height:${Math.round(ph * 0.44)}px;
      background:linear-gradient(180deg,#fff 0%,rgba(235,242,255,0.88) 55%,rgba(255,255,255,0) 100%);
      clip-path:polygon(0% 100%, 50% 0%, 100% 100%);
      z-index:2;
    `);
    // Second smaller peak (left shoulder)
    const sp = el('div', `
      position:absolute;
      left:${mx - mw*0.46}px; top:${groundY - ph*0.72}px;
      width:${mw * 0.38}px; height:${ph * 0.72 + 10}px;
      background:linear-gradient(170deg,#607d8b 0%,#78909c 30%,#5a9e35 100%);
      clip-path:polygon(0% 100%, 48% 0%, 100% 100%);
      z-index:1;
    `);
    worldEl.appendChild(sp);
    worldEl.appendChild(mt);
    worldEl.appendChild(sc);
  }

  // ── Milestone signs ───────────────────────────────────────────
  const pakBoundary = flightIdx > 0 ? xPositions[flightIdx - 1] + 440 : 0;

  MILESTONES.forEach((m, i) => {
    const x    = xPositions[i];
    const yOff = m.yOffset || 0;
    const inPak = x < pakBoundary;
    const onMountain = Math.abs(yOff) > 60;

    const wrap = el('div', `
      position:absolute; left:${x}px; top:${groundY - 72 - yOff}px;
      transform:translateX(-50%);
      display:flex; flex-direction:column; align-items:center;
      transition:top 0.95s cubic-bezier(0.4,0,0.2,1);
    `);
    wrap.id = `sign-${i}`;
    const board = el('div', `
      background:${i===0?'#fff9c4':'#fffbf0'};
      border:2.5px solid ${i===0?'#e6a817':'#555'};
      border-radius:8px; padding:5px 14px;
      font-size:12px; font-weight:700; color:#222;
      box-shadow:2px 3px 0 ${i===0?'#c48000':'#999'};
      white-space:nowrap; font-family:inherit;
      transition:background 0.35s,border-color 0.35s,box-shadow 0.35s;
    `);
    board.className = 'sign-board';
    board.style.cursor = 'pointer';
    board.style.transition += ',transform 0.15s,filter 0.15s';
    board.addEventListener('mouseenter', () => {
      if (i !== current) { board.style.transform = 'scale(1.12)'; board.style.filter = 'brightness(1.15)'; }
    });
    board.addEventListener('mouseleave', () => {
      board.style.transform = ''; board.style.filter = '';
    });
    wrap.addEventListener('click', () => {
      if (started && i !== current) goTo(i);
    });
    if (m.type === 'flight') {
      board.style.background = '#1a237e';
      board.style.borderColor = '#90caf9';
      board.style.color = '#fff';
      board.style.boxShadow = '2px 3px 0 #0d47a1';
      board.textContent = '✈ ' + m.year;
    } else {
      board.textContent = m.year;
    }
    const poleColor = onMountain ? '#546e7a' : '#555';
    const pole = el('div', `width:4px;height:42px;background:${poleColor};border-radius:0 0 2px 2px;`);
    wrap.appendChild(board);
    wrap.appendChild(pole);
    worldEl.appendChild(wrap);

    // Terrain bump (skip for mountain milestones — the mountain shape handles it;
    // skip for flight zone)
    if (yOff !== 0 && !onMountain && m.type !== 'flight') {
      const bumpBg = inPak
        ? (yOff > 0 ? '#c8965a' : '#b07a40')
        : (yOff > 0 ? '#5a9e35' : '#4a8e28');
      const bump = el('div', `
        position:absolute;
        left:${x - 160}px; top:${groundY - Math.abs(yOff) - 2}px;
        width:320px; height:${Math.abs(yOff) + 6}px;
        background:${bumpBg};
        border-radius:${yOff > 0 ? '60% 60% 0 0' : '0 0 60% 60%'}/
                      ${yOff > 0 ? '60% 60% 0 0' : '0 0 60% 60%'};
        z-index:${yOff > 0 ? 5 : 0};
      `);
      worldEl.appendChild(bump);
    }
  });

  // ── Scenery ───────────────────────────────────────────────────
  const scenery = [
    { x: xPositions[0] + 300, type: 'minaret',  color: '#c0843a' },
    { x: xPositions[0] + 450, type: 'dome',     color: '#d4954a' },
    { x: xPositions[0] - 180, type: 'minaret',  color: '#b07830' },
    { x: xPositions[2] + 180, type: 'tower',    color: '#607d8b' },
    { x: xPositions[brownPeakIdx !== -1 ? brownPeakIdx : 9] - 260, type: 'building', color: '#78909c' },
    { x: xPositions[brownPeakIdx !== -1 ? brownPeakIdx : 9] + 210, type: 'building', color: '#8d6e63' },
  ];

  scenery.forEach(s => {
    const gh = groundY;
    let html = '';
    if (s.type === 'minaret') {
      html = `<div style="width:16px;height:70px;background:${s.color};margin:0 auto;border-radius:2px 2px 0 0;"></div>
              <div style="width:28px;height:8px;background:${s.color};margin:0 auto;border-radius:2px;"></div>`;
    } else if (s.type === 'dome') {
      html = `<div style="width:50px;height:26px;background:${s.color};border-radius:25px 25px 0 0;margin:0 auto;"></div>
              <div style="width:60px;height:10px;background:${s.color};margin:0 auto;"></div>`;
    } else if (s.type === 'tower') {
      html = `<div style="width:6px;height:80px;background:${s.color};margin:0 auto;"></div>
              <div style="width:30px;height:2px;background:${s.color};margin:-60px auto 0;"></div>
              <div style="width:20px;height:2px;background:${s.color};margin:15px auto;"></div>`;
    } else if (s.type === 'building') {
      html = `<div style="width:60px;height:55px;background:${s.color};border-radius:3px 3px 0 0;
              display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:6px;box-sizing:border-box;">
              ${'<div style="background:rgba(255,255,255,0.3);border-radius:1px;"></div>'.repeat(9)}</div>`;
    }
    const obj = el('div', `
      position:absolute; left:${s.x}px; top:${gh - 90}px;
      transform:translateX(-50%); opacity:0.75; pointer-events:none;
    `, html);
    worldEl.appendChild(obj);
  });

  // ── Trees ─────────────────────────────────────────────────────
  const oceanStart = flightIdx > 0 ? xPositions[flightIdx - 1] + 380 : Infinity;
  const oceanEnd   = (flightIdx > 0 && flightIdx < MILESTONES.length - 1)
                     ? xPositions[flightIdx + 1] - 160 : -Infinity;
  const mountainStart = brownPeakIdx !== -1 ? xPositions[brownPeakIdx] - 1400 : Infinity;
  const mountainEnd   = brownPeakIdx !== -1 ? xPositions[brownPeakIdx] + 1400 : -Infinity;

  xPositions.forEach(baseX => {
    [-430,-270,-100, 90, 280, 460, 650].forEach(off => {
      const x = baseX + off;
      if (x < 80) return;
      if (x > oceanStart && x < oceanEnd) return;

      const inPakTree = x < pakBoundary;
      const onMtn     = x > mountainStart && x < mountainEnd;
      const back = Math.random() > 0.45;
      const s  = back ? 0.55 + Math.random()*0.2 : 0.8 + Math.random()*0.35;
      const h  = Math.round((46+Math.random()*38)*s);
      const w  = Math.round(h*0.56);
      // Tree colours: dry/sparse in Pakistan, alpine grey-green on mountain, normal elsewhere
      const g1 = inPakTree ? '#7a5a18' : onMtn ? '#4a6741' : (back ? '#2e6e3b' : '#256832');
      const g2 = inPakTree ? '#9e7a22' : onMtn ? '#5e8055' : (back ? '#3a8f4e' : '#2f8540');
      const opa = inPakTree ? (back ? 0.35 : 0.6) : (back ? 0.5 : 1);
      const tree = el('div', `
        position:absolute; left:${x}px; top:${groundY - h + (back?0:6)}px;
        transform:translateX(-50%); opacity:${opa};
        z-index:${back?1:3}; pointer-events:none;
      `, `
        <div style="width:0;height:0;
          border-left:${w/2}px solid transparent;border-right:${w/2}px solid transparent;
          border-bottom:${h*0.56}px solid ${g1};margin:0 auto;"></div>
        <div style="width:0;height:0;
          border-left:${w*0.42}px solid transparent;border-right:${w*0.42}px solid transparent;
          border-bottom:${h*0.52}px solid ${g2};margin:-${h*0.18}px auto 0;"></div>
        <div style="width:${Math.max(5,w*0.13)}px;height:${h*0.13}px;
          background:#5d4037;margin:0 auto;"></div>
      `);
      worldEl.appendChild(tree);
    });
  });

  // ── Clouds ────────────────────────────────────────────────────
  [[7,6,150,48],[24,4,105,34],[48,10,170,54],[68,5,92,30],[84,12,128,40]]
    .forEach(([lp,tp,w,h]) => {
      const c = el('div', `left:${lp}%;top:${tp}%;width:${w}px;height:${h}px;position:absolute;`);
      c.className = 'cloud';
      cloudsEl.appendChild(c);
    });

  // Position character
  updateCharPosition(0, false);
}

// ── Character vertical position ───────────────────────────────────
function updateCharPosition(index, animate) {
  const vh = window.innerHeight;
  const baseBottom = Math.round(vh * 0.38);
  const yOff = MILESTONES[index].yOffset || 0;
  const vw = window.innerWidth;

  if (!animate) charWrap.style.transition = 'none';
  charWrap.style.cssText = `
    position:fixed;
    left:${Math.round(vw/2)}px;
    bottom:${baseBottom + yOff}px;
    transform:translateX(-50%);
    z-index:50; pointer-events:none;
    transition:${animate ? 'bottom 0.95s cubic-bezier(0.4,0,0.2,1)' : 'none'};
  `;
}

// ── World position ────────────────────────────────────────────────
function worldTX(index) {
  return (window.innerWidth / 2) - xPositions[index];
}

// ── Sky ───────────────────────────────────────────────────────────
function updateSky(i) {
  const [c1, c2] = MILESTONES[i].sky;
  skyEl.style.background = `linear-gradient(180deg,${c1} 0%,${c2} 100%)`;
}

// ── Signs ─────────────────────────────────────────────────────────
function updateSigns(active) {
  MILESTONES.forEach((_, i) => {
    const board = document.querySelector(`#sign-${i} .sign-board`);
    if (!board) return;
    board.style.background  = i===active ? '#fff9c4' : '#fffbf0';
    board.style.borderColor = i===active ? '#e6a817' : '#555';
    board.style.boxShadow   = i===active ? '2px 3px 0 #c48000' : '2px 3px 0 #999';
    board.style.cursor      = i===active ? 'default' : 'pointer';
  });
}

// ── Card ──────────────────────────────────────────────────────────
function showCard(m) {
  document.getElementById('card-year').textContent  = m.year;
  document.getElementById('card-title').textContent = m.title;
  document.getElementById('card-desc').textContent  = m.description;

  const img = document.getElementById('card-image');
  const hint = document.getElementById('upload-hint');
  if (m.image) {
    img.src = m.image; img.className = 'visible'; hint.className = 'img-upload-hint';
  } else {
    img.src = ''; img.className = ''; hint.className = 'img-upload-hint';
  }

  const tagEl = document.getElementById('card-tag');
  if (m.tag) {
    tagEl.textContent = m.tag;
    tagEl.style.background = m.tagColor || '#333';
    tagEl.style.color = '#fff';
    tagEl.className = 'show';
  } else { tagEl.className = ''; }

  const stampEl = document.getElementById('card-stamp');
  if (m.stamp) { stampEl.textContent = m.stamp; stampEl.className = 'show'; }
  else { stampEl.className = ''; }

  infoCard.classList.add('show');
}

// ── Nav ───────────────────────────────────────────────────────────
function updateNav() {
  btnPrev.disabled = current === 0;
  btnNext.disabled = current === MILESTONES.length - 1;
  progressEl.textContent = `${current + 1} / ${MILESTONES.length}`;
}

// ── Go to milestone ───────────────────────────────────────────────
function goTo(index) {
  if (busy) return;
  if (index < 0 || index >= MILESTONES.length) return;
  busy = true;
  infoCard.classList.remove('show');

  const flightOverlay  = document.getElementById('flight-overlay');
  const goingFlight    = MILESTONES[index].type === 'flight';
  const leavingFlight  = current >= 0 && MILESTONES[current].type === 'flight';

  setTimeout(() => {
    current = index;
    updateSigns(index);
    updateSky(index);
    updateNav();
    startWalking();
    updateCharPosition(index, true);
    worldEl.style.transform = `translateX(${worldTX(index)}px)`;

    if (leavingFlight) {
      flightOverlay.classList.remove('show');
      charWrap.style.opacity = '1';
    }

    setTimeout(() => {
      stopWalking();
      if (goingFlight) {
        charWrap.style.opacity = '0';
        flightOverlay.classList.add('show');
      }
      showCard(MILESTONES[index]);
      busy = false;
    }, WALK_MS);
  }, 260);
}

// ── Controls ──────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!started) { if (e.key==='Enter'||e.key===' ') startGame(); return; }
  if (e.key==='ArrowRight'||e.key==='d') { e.preventDefault(); goTo(current+1); }
  if (e.key==='ArrowLeft' ||e.key==='a') { e.preventDefault(); goTo(current-1); }
});

let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', e => {
  if (!started) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 48) goTo(dx < 0 ? current+1 : current-1);
}, {passive:true});

btnPrev.addEventListener('click', () => goTo(current-1));
btnNext.addEventListener('click', () => goTo(current+1));
document.getElementById('start-btn').addEventListener('click', startGame);

// ── Start ─────────────────────────────────────────────────────────
function startGame() {
  if (started) return;
  started = true;
  titleScr.style.opacity = '0';
  setTimeout(() => titleScr.style.display = 'none', 700);
  keyHint.style.display = 'block';
  updateNav();

  worldEl.style.transition = 'none';
  worldEl.style.transform  = `translateX(${worldTX(0)}px)`;
  requestAnimationFrame(() => requestAnimationFrame(() => {
    worldEl.style.transition = '';
    updateSky(0);
    setTimeout(() => showCard(MILESTONES[0]), 500);
  }));
}

// ── Init ──────────────────────────────────────────────────────────
function init() {
  document.getElementById('ts-name').textContent    = ABOUT.name;
  document.getElementById('ts-tagline').textContent = ABOUT.tagline;
  document.title = `${ABOUT.name} — My Journey`;
  buildWorld();
  updateSky(0);
  worldEl.style.transition = 'none';
  worldEl.style.transform  = `translateX(${worldTX(0)}px)`;
  requestAnimationFrame(() => requestAnimationFrame(() => { worldEl.style.transition = ''; }));
}

init();
</script>
</body>
</html>
